name: Apache OpenJpa CI

on:
  push:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Java JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compila il progetto (senza eseguire i test)
        run: mvn clean install -DskipTests -Denforcer.skip=true -Dcheckstyle.skip=true -Drat.skip=true
